<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <link rel="icon" type="image/x-icon" href="f/diceroll/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="yandex-verification" content="6723a499245c0e11" />
    <meta name="google-site-verification" content="UmkWSkfoFNxgbCTCX-nVQMydwsNiDW730S-1fy_sChk" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <title>{{.title}}</title>
    <section class="hero is-small is-primary">
        <div class="hero-body">
            <p class="title">
                Броски кубика
            </p>
            <p class="subtitle">
                Я знаю, что ты забыл кубики дома 😁
            </p>
        </div>
    </section>
</head>
<body>
    <script src="f/diceroll/diceroll.js"></script>
    <style> @import url("f/diceroll/diceroll.css");</style>

    <nav class="tabs is-boxed has-background-primary is-centered">
        <div class="container">
            <ul>
                <li class="tab is-active" onclick="openTab(event,'multiRollPage')"><a>Основной раздел</a></li>
                <li class="tab" onclick="openTab(event,'historyPage')"><a >История</a></li>
            </ul>
        </div>
    </nav>
    <div class="container section" >
        <div id="multiRollPage" class="content-tab">
            <center>
                <div id="main_place">
                    <label class="historyListStyle">Количество кубиков: </label>
                    <div class="countButtons">
                        <div>
                            <button class="button is-primary" onclick="plus(1)">+1</button>
                            <button class="button is-primary" onclick="plus(10)">+10</button>
                            <label for="number"></label><input class="input is-primary" type="number" readonly="readonly" id="number" maxlength="3" min="1" value="1" style="text-align:center"/>
                            <button class="button is-primary" onclick="minus(1)">-1</button>
                            <button class="button is-primary" onclick="minus(10)">-10</button>
                        </div>
                    </div>
                    <label class="historyListStyle">Виды кубиков: </label>
                    <div class="select is-primary">
                        <label>
                            <select name="diceID" class="is-focused">
                                <option value="D4">К4</option>
                                <option value="D6">К6</option>
                                <option value="D8">К8</option>
                                <option value="D10">К10</option>
                                <option value="D12">К12</option>
                                <option value="D20">К20</option>
                                <option value="D100">К100</option>
                            </select>
                        </label>
                    </div>
                    <div style="padding: 1rem">
                        <button class="button is-primary is-large" onclick="getDiceResult()">Получить результат</button>
                    </div>
                    <div>
                        <label class="diceRequest" id="diceRequest">Информация:</label>
                    </div>
                    <div>
                        <label class="diceResult" id="diceResult">Результат</label>
                    </div>
                </div>
            </center>
            <div id="second_place">
                    <details>
                        <summary class="rollSpoiler" id="rollSpoiler" onclick="switchPlaces()">Как я получил такое значение?</summary>
                        <p><label class="rollSumHeader" id="rollSumHeader" style="text-align: center" >Шаг:  Результат:</label></p>
                        <p class="rollSumTable" id="rollSumTable" style="text-align: center">Бросок + Бросок + ...... + Бросок</p>
                    </details>
                </div>
        </div>
        <div id="historyPage" class="content-tab" style="display:none">
            <p class ="historyListEmpty" id="historyEmpty" > Вы еще не бросали кубик.</p>
            <div style="padding-bottom: 20px">
                <button class="button is-primary" id="clearHistoryButton" style="display: none" onclick="clearHistoryList()">Очистить список</button>
            </div>
            <p class ="historyListStyle" id="historyList"></p>
        </div>
    </div>
</body>
</html>
